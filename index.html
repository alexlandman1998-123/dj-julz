<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DJ JULz</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #101010;
        color: #f7f4ee;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 68, 68, 0.28), transparent 28rem),
          radial-gradient(circle at 80% 80%, rgba(0, 190, 170, 0.22), transparent 26rem),
          #101010;
      }

      main {
        width: min(90vw, 680px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 7rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      p {
        margin: 1.5rem 0 0;
        font-size: 1.2rem;
        color: #d8d2c8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DJ JULz</h1>
      <p>Music, mixes, and moments.</p>
    </main>
  </body>
</html>
